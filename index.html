<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- 
      1. 将图片 (如 logo.png) 放入 public/ 文件夹
      2. 修改下面的 href="/logo.png" 和 type="image/png"
    -->
    <link rel="icon" type="image/png" href="/eat.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eat Everything</title>
    <script type="module">
      if (import.meta.hot?.on) {
        import.meta.hot.on('vite:error', (error) => {
          if (error.err) {
            console.error(
              [error.err.message, error.err.frame].filter(Boolean).join('\n'),
            )
          }
        })
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
